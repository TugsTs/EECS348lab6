<html>
<body>


<h1>Practice Four: PHP Multiplication Table</h1>
<form method="post">

Enter a number:
<input type="number" name="num"><input type="submit">
</form>

<?php

if(isset($_POST["num"]))
{
    $n = $_POST["num"];
    echo "<table border='1'>";
    echo "<tr><td></td>";
    for($i = 1; $i <= $n; $i++)
    {
        echo "<td>$i</td>";
    }
    echo "</tr>";

    // table rows
    for($i = 1; $i <= $n; $i++)
    {
        echo "<tr>";
        echo "<td>$i</td>";
        for($j = 1; $j <= $n; $j++)
        {
            echo "<td>" . ($i*$j) . "</td>";
        }
        echo "</tr>";
    }
    echo "</table>";
}

?>
